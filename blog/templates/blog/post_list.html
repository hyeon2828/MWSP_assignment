{% extends 'blog/base.html' %}

{% block content %}
    <a href="{% url 'post_new' %}" style="display:block; background:red; padding:15px; color:white; font-size:20px; font-weight:bold; text-align:center; margin-bottom:20px;">
        + 새 글 쓰기
    </a>

    {% for post in posts %}
        <div class="post">
            <div class="date">
                <p>게시일: {{ post.published_date }}</p>
            </div>
            <h2><a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a></h2>
            <p>{{ post.text|linebreaksbr }}</p>
        </div>
    {% endfor %}
{% endblock %}

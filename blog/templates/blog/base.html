{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Django 블로그</title>
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>
<body>
    <header class="page-header">
        {% if user.is_authenticated %}
            <a href="{% url 'post_new' %}" class="top-menu">
                <span style="color: white; font-size: 20pt; float: right;">+ 새 글 쓰기</span>
            </a>
        {% endif %}
        <h1><a href="/">Django 웹 프레임워크 실습</a></h1>
    </header>

    <main class="content">
        <div class="row">
            <div class="col-md-8">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </main>
</body>
</html>
